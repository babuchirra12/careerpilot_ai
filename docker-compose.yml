services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: careerpilot-db
    environment:
      POSTGRES_DB: careerpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Admin@123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careerpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - careerpilot-net
    restart: unless-stopped

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerpilot-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/careerpilot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-Admin@123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - careerpilot-net
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerpilot-frontend
    environment:
      BACKEND_URL: http://backend:8081
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - careerpilot-net
    restart: unless-stopped

# ── Volumes & Networks ───────────────────────────────────────────────────────
volumes:
  postgres_data:

networks:
  careerpilot-net:
    driver: bridge
